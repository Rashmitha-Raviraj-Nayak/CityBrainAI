version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      CITYBRAIN_APPLICATION__ENVIRONMENT: development
      CITYBRAIN_CORS__ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    env_file:
      - .env

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
    depends_on:
      - backend
